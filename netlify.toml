[build]
  base = "frontend"
  command = "npm ci && npm run build"
  publish = "dist/frontend/browser"

[[redirects]]
  from = "/api/*"
  to = "https://REPLACE-WITH-YOUR-RENDER-URL.onrender.com/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
